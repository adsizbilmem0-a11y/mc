name: Windows-Kesin-Cozum-Botu-v3
on: workflow_dispatch

jobs:
  oylama-windows:
    runs-on: windows-latest
    steps:
      - name: Python Paketlerini Hazirla
        run: |
          pip install setuptools undetected-chromedriver selenium --quiet

      - name: Bot Dosyasini Olustur
        run: |
          $botCode = @"
          import undetected_chromedriver as uc
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import time
          import os
          import sys

          # Windows terminal hata vermesin diye ciktiyi UTF-8 yap
          sys.stdout.reconfigure(encoding='utf-8')

          NICKNAME = "ZdzqcvDM7o"
          URL = "https://minecraft-mp.com/server/328354/vote/"

          options = uc.ChromeOptions()
          options.add_argument("--incognito")
          options.add_argument("--headless") 
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          # Gercek bir kullanıcı gibi cozunurluk ver
          options.add_argument("--window-size=1920,1080")

          print("--- BOT CALISMAYA BASLADI ---")
          
          driver = None
          try:
              chrome_path = r"C:\Program Files\Google\Chrome\Application\chrome.exe"
              print("Tarayici hazirlaniyor (v145)...")
              driver = uc.Chrome(options=options, browser_executable_path=chrome_path, version_main=145)
              
              # Implicitly wait: Bir eleman hemen yoksa 15 sn boyunca aramaya devam et
              driver.implicitly_wait(15)
              wait = WebDriverWait(driver, 40)

              print(f"Siteye gidiliyor: {URL}")
              driver.get(URL)
              
              # Cloudflare duvarini asmak icin biraz bekle ve ekrana bak
              print("Sayfa yukleniyor, Cloudflare kontrol ediliyor...")
              time.sleep(10) 
              
              # Formun yuklenip yuklenmedigini anlamak icin ekran goruntusu al
              driver.save_screenshot('ilk_bakis.png')

              # Nickname kutusunu bekle
              print("Nickname kutusu araniyor...")
              nickname_input = wait.until(EC.element_to_be_clickable((By.ID, "nickname")))
              nickname_input.send_keys(NICKNAME)
              print(f"Nickname girildi: {NICKNAME}")

              # Checkbox
              accept_checkbox = driver.find_element(By.ID, "accept")
              driver.execute_script("arguments[0].click();", accept_checkbox)
              print("Sozlesme onaylandi.")

              # Captcha Kontrolu
              print("Captcha (Turnstile) bekleniyor...")
              for i in range(45):
                  token = driver.execute_script("return document.querySelector('[name=\"cf-turnstile-response\"]').value;")
                  if token and len(token) > 10:
                      print(f"Captcha gecildi! ({i+1}s)")
                      break
                  time.sleep(1)

              # Butona Tikla
              btn = driver.find_element(By.CSS_SELECTOR, "button[type='submit'][form='vote_form']")
              driver.execute_script("arguments[0].scrollIntoView(true);", btn)
              time.sleep(2)
              driver.execute_script("arguments[0].click();", btn)
              print("VOTE BUTONUNA BASILDI!")
              
              time.sleep(8)
              driver.save_screenshot('sonuc_ekrani.png')
              print("Son durum kaydedildi.")

          except Exception as e:
              print(f"HATA DETAYI: {str(e)}")
              if driver:
                  driver.save_screenshot('hata_ani.png')
          finally:
              if driver:
                  driver.quit()
          "@
          $botCode | Out-File -FilePath "vote_bot.py" -Encoding utf8

      - name: Botu Calistir
        run: python vote_bot.py

      - name: Kanitlari Yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oylama-kanitlari
          path: "*.png"
