name: Linux-Hizli-Oylama-Botu
on: workflow_dispatch

jobs:
  oylama:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazirla
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          pip3 install undetected-chromedriver selenium --quiet

      - name: Botu Olustur (Senin Kodun)
        run: |
          cat <<EOF > vote_bot.py
          import undetected_chromedriver as uc
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import time

          NICKNAME = "ZdzqcvDM7o"
          URL = "https://minecraft-mp.com/server/328354/vote/"

          options = uc.ChromeOptions()
          # Senin 5 Mbps internetin icin headless modu aktif ettik
          options.add_argument("--headless") 
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          options.add_argument("--window-size=1920,1080")
          options.add_argument("--incognito")

          print("--- UC BOT BASLATILDI (LINUX) ---")
          try:
              driver = uc.Chrome(options=options)
              wait = WebDriverWait(driver, 30)

              driver.get(URL)
              print("Sayfa acildi.")
              time.sleep(4)

              # Nickname doldur
              nickname_input = wait.until(EC.presence_of_element_located((By.ID, "nickname")))
              nickname_input.click()
              nickname_input.clear()
              nickname_input.send_keys(NICKNAME)
              print(f"Nickname girildi: {NICKNAME}")

              # Checkbox işaretle
              accept_checkbox = wait.until(EC.presence_of_element_located((By.ID, "accept")))
              if not accept_checkbox.is_selected():
                  driver.execute_script("arguments[0].click();", accept_checkbox)
                  print("Sozlesme onaylandi.")

              # Captcha tokenini bekle
              print("Captcha bekleniyor...")
              for i in range(30):
                  token = driver.execute_script(
                      "return document.querySelector('[name=\"cf-turnstile-response\"]').value;"
                  )
                  if token and len(token) > 10:
                      print(f"✅ Captcha cozuldu! ({i+1}s)")
                      break
                  time.sleep(1)
              else:
                  print("⚠️ Captcha timeout")

              time.sleep(1)

              # Butona tikla
              btn = driver.find_element(By.CSS_SELECTOR, "button[type='submit'][form='vote_form']")
              driver.execute_script("arguments[0].scrollIntoView(true);", btn)
              time.sleep(0.5)
              driver.execute_script("arguments[0].click();", btn)
              print("✅ Butona tiklandi!")

              time.sleep(5)
              print("Sonuc URL:", driver.current_url)
              
              # Kanit icin bir ekran goruntusu alalim
              driver.save_screenshot('sonuc.png')
              print("Ekran goruntusu kaydedildi (Artifacts kismindan indirebilirsin).")

          except Exception as e:
              print(f"❌ Hata: {e}")
          finally:
              driver.quit()
          EOF

      - name: Botu Calistir
        run: python3 vote_bot.py

      - name: Kanit Goruntusunu Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: oylama-sonucu
          path: sonuc.png
