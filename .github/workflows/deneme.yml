name: 24-Saat-Kesintisiz-Bot
on: workflow_dispatch

jobs:
  oylama-botu:
    runs-on: windows-latest
    steps:
      - name: Sanal Ekran ve GUI Aktif Et
        run: |
          # Windows'un kullanıcı oturumunu açık tutması ve GUI'yi kapatmaması için
          Set-ItemProperty -Path 'HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System' -Name "dontdisplaylastusername" -Value 1
          # Ekranı senin koordinatlarına (1440x900) çiviliyoruz
          Set-DisplayResolution -Width 1440 -Height 900 -Force

      - name: Bot Dosyasini Hazirla
        run: |
          $botCode = @"
          import pyautogui
          import time
          import random
          import sys

          # EKRAN OLMASA BILE CALISMAYI ZORLA
          pyautogui.FAILSAFE = False

          KOORDINATLAR = {
              "nick": (335, 558),
              "checkbox": (150, 600),
              "cloudflare": (163, 654),
              "vote_btn": (176, 716)
          }
          USERNAME = "ZdzqcvDM7o"

          def operasyon():
              print("Bot basliyor... Sen baglanmasan da ben buradayim.")
              time.sleep(30) # Sistemin ve Chrome'un tamamen oturması için
              
              # Sanal masaüstünü odakla
              pyautogui.click(720, 450)
              time.sleep(2)
              
              # 1. Nick Yazma
              pyautogui.moveTo(KOORDINATLAR['nick'], duration=1.5)
              pyautogui.click()
              time.sleep(2)
              for harf in USERNAME:
                  pyautogui.write(harf)
                  time.sleep(0.1)
              
              # 2. Checkbox
              time.sleep(3)
              pyautogui.click(KOORDINATLAR['checkbox'], duration=1.2)
              
              # 3. Cloudflare (Burasi kritik, biraz uzun bekleyelim)
              time.sleep(3)
              pyautogui.click(KOORDINATLAR['cloudflare'], duration=1.2)
              print("Cloudflare onaylaniyor, 45 saniye pusudayim...")
              time.sleep(45) 
              
              # 4. Vote Butonu
              pyautogui.click(KOORDINATLAR['vote_btn'], duration=1.5)
              print("VOTE BASILDI! Gorev tamam.")

          if __name__ == "__main__":
              operasyon()
          "@
          $botCode | Out-File -FilePath "vote_bot.py" -Encoding utf8

      - name: Chrome ve Botu Patlat
        run: |
          pip install pyautogui --quiet
          $url = "https://minecraft-mp.com/server/328354/vote/"
          # Chrome'u sanal masaüstünde senin istediğin boyutta açıyoruz
          Start-Process "C:\Program Files\Google\Chrome\Application\chrome.exe" -ArgumentList "--window-size=1440,900", "--no-sandbox", "--disable-setuid-sandbox", $url
          # Botu çalıştır ve logları GitHub ekranında göster
          python vote_bot.py
