name: Linux-Hizli-Oylama-Botu
on: workflow_dispatch

jobs:
  oylama-operasyonu:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi ve Chrome'u Hazirla
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          pip3 install undetected-chromedriver selenium --quiet

      - name: Botu Olustur (Senin Kodun - Linux Modu)
        run: |
          cat <<EOF > vote_bot.py
          import undetected_chromedriver as uc
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import time

          NICKNAME = "ZdzqcvDM7o"
          URL = "https://minecraft-mp.com/server/328354/vote/"

          options = uc.ChromeOptions()
          # Hız ve düşük internet için kritik ayarlar
          options.add_argument('--headless') # Görüntü aktarmaz, internetini yemez
          options.add_argument('--no-sandbox')
          options.add_argument('--disable-dev-shm-usage')
          options.add_argument('--disable-gpu')

          print("--- BOT BASLATILDI (LINUX HEADLESS) ---")
          try:
              driver = uc.Chrome(options=options)
              wait = WebDriverWait(driver, 30)

              print("Siteye gidiliyor...")
              driver.get(URL)
              
              # Nickname
              nickname_input = wait.until(EC.presence_of_element_located((By.ID, "nickname")))
              nickname_input.send_keys(NICKNAME)
              print(f"✅ Nickname girildi: {NICKNAME}")

              # Checkbox
              accept_checkbox = driver.find_element(By.ID, "accept")
              driver.execute_script("arguments[0].click();", accept_checkbox)
              print("✅ Sozlesme onaylandi.")

              # Cloudflare Turnstile Bekle
              print("Cloudflare cozuluyor, lütfen bekleyin...")
              for i in range(45):
                  token = driver.execute_script("return document.querySelector('[name=\"cf-turnstile-response\"]').value;")
                  if token and len(token) > 10:
                      print(f"🔥 Cloudflare Gecildi! ({i}s)")
                      break
                  time.sleep(1)

              # Vote Butonuna Tikla
              btn = driver.find_element(By.CSS_SELECTOR, "button[type='submit'][form='vote_form']")
              driver.execute_script("arguments[0].click();", btn)
              print("🚀 VOTE BUTONUNA BASILDI!")
              
              time.sleep(5)
              print("Son Durum URL:", driver.current_url)
              
              # Kanıt için ekran görüntüsü al (Loglarda görebilirsin)
              driver.save_screenshot('sonuc.png')
              print("Ekran görüntüsü 'sonuc.png' olarak kaydedildi.")

          except Exception as e:
              print(f"❌ HATA OLUSTU: {e}")
          finally:
              driver.quit()
          EOF

      - name: Botu Calistir
        run: python3 vote_bot.py

      - name: Ekran Goruntusunu Yukle (Opsiyonel)
        uses: actions/upload-artifact@v4
        with:
          name: oylama-kaniti
          path: sonuc.png
