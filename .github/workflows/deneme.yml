name: 3-Sabit-Direkt-Proxy
on: workflow_dispatch

jobs:
  proxy1:
    runs-on: ubuntu-latest
    steps:
      - name: Baslat
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          ./gost-linux-amd64-2.11.5 -L :8080 > gost.log 2>&1 &
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          ./bore local 8080 --to bore.pub > bore.log 2>&1 &
          sleep 15
          PORT=$(sed -r 's/\x1B\[[0-9;]*[mK]//g' bore.log | grep -oP 'remote_port=\K[0-9]+' | head -1)
          TIMESTAMP=$(date +%s)
          
          # Dinamik Numara Bulma
          ALL_PROXIES=$(curl -s "https://proxybot-b4a59-default-rtdb.firebaseio.com/proxies.json")
          if [ "$ALL_PROXIES" == "null" ] || [ -z "$ALL_PROXIES" ]; then NEXT_NUM=1; else
            LAST_NUM=$(echo $ALL_PROXIES | grep -oP 'proxy\K[0-9]+' | sort -n | tail -1)
            [ -z "$LAST_NUM" ] && LAST_NUM=0; NEXT_NUM=$((LAST_NUM + 1)); fi
          
          curl -X PUT -d "{\"url\": \"bore.pub\", \"port\": \"$PORT\", \"time\": $TIMESTAMP, \"status\": \"kullanılmadı\"}" "https://proxybot-b4a59-default-rtdb.firebaseio.com/proxies/proxy$NEXT_NUM.json"
          tail -f bore.log

