name: 3-rdp-foto-makinesi
on: workflow_dispatch

jobs:
  makine1:
    runs-on: windows-latest
    timeout-minutes: 9999
    steps:
      - name: Kutuphaneleri Kur
        run: |
          pip install setuptools undetected-chromedriver

      - name: Foto Kodunu Olustur
        run: |
          @'
          import undetected_chromedriver as uc
          import time
          import os
          import sys
          sys.stdout.reconfigure(encoding='utf-8')
          kayit_yeri = r"D:\a\mc\mc"
          def operasyon():
              try:
                  options = uc.ChromeOptions()
                  options.add_argument("--start-maximized")
                  options.add_argument("--disable-gpu")
                  driver = uc.Chrome(options=options, version_main=145)
                  driver.get("https://minecraft-mp.com/server/328354/vote/")
                  print("--- Sayfa yukleniyor (25 sn) ---")
                  time.sleep(25)
                  driver.save_screenshot(os.path.join(kayit_yeri, "2_tarayici_aktif_m1.png"))
                  print("Foto kaydedildi!")
                  driver.quit()
              except Exception as e:
                  print(f"Hata: {e}")
          if __name__ == "__main__":
              operasyon()
          '@ | Out-File -FilePath foto_cek.py -Encoding utf8

      - name: RDP Hazirlik
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Admin123!" -Force)

      - name: Fotolari Cek
        run: python foto_cek.py

      - name: Bore Tunnel Baslat
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive bore.zip -DestinationPath .
          Write-Host "MAKINE 1 - RDP BAGLANTI BILGILERI:" -ForegroundColor Green
          .\bore.exe local 3389 --to bore.pub

