name: 3-rdp-makinesi
on: workflow_dispatch

jobs:
  makine1:
    runs-on: windows-latest
    timeout-minutes: 9999
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Ayarlar (Cozunurluk ve RDP)
        run: |
          Set-DisplayResolution -Width 1440 -Height 900 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Admin123!" -Force)

      - name: Open Chrome
        run: |
          $url = "https://minecraft-mp.com/server/328354/vote/"
          Start-Process "C:\Program Files\Google\Chrome\Application\chrome.exe" -ArgumentList "--start-maximized", $url
          Start-Sleep -s 20

      - name: Python Botu Calistir
        run: |
          pip install pyautogui opencv-python pillow
          cd .github/workflows
          python vote_bot.py 1

      - name: Start Bore Tunnel
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive bore.zip -DestinationPath .
          .\bore.exe local 3389 --to bore.pub

