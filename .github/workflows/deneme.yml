- name: Start Bore & Report to Firebase
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          
          # Tüneli başlat (Logları temiz tutmak için dosyaya yazıyoruz)
          ./bore local 22 --to bore.pub > bore.log 2>&1 &
          
          # Port gelene kadar maksimum 30 saniye boyunca döngüde bekle
          echo "Port bekleniyor..."
          for i in {1..15}; do
            PORT=$(grep -oP 'remote_port=\K\d+' bore.log | head -1)
            if [ ! -z "$PORT" ]; then
              break
            fi
            echo "Deneme $i: Port henüz atanmadı, bekleniyor..."
            sleep 2
          done

          if [ -z "$PORT" ]; then
            echo "HATA: Bore tüneli başlatılamadı veya port alınamadı!"
            cat bore.log # Hatanın ne olduğunu görmek için logu ekrana bas
            exit 1
          fi

          echo "Bulunan Port: $PORT"

          # Firebase'e gönder (Statik ID yerine her zaman benzersiz olan run_id kullanalım)
          FIREBASE_URL="https://proxybot-b4a59-default-rtdb.firebaseio.com/proxies/${{ github.run_id }}.json"
          curl -X PUT -H "Content-Type: application/json" \
               -d "{\"address\": \"bore.pub\", \"port\": \"$PORT\", \"user\": \"runner\", \"pass\": \"Admin123!\", \"status\": \"online\", \"timestamp\": \"$(date)\"}" \
               $FIREBASE_URL

          echo "Proxy bilgileri Firebase'e başarıyla iletildi: bore.pub:$PORT"
          
          # Tüneli canlı tut
          tail -f bore.log
