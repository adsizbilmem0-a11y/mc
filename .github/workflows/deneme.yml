name: Linux SSH Proxy Node
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 9999

    steps:
      - name: Setup SSH & User
        run: |
          echo "runner:Admin123!" | sudo chpasswd
          sudo systemctl start ssh

      - name: Start Bore & Report to Firebase
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          
          # Tüneli başlat
          ./bore local 22 --to bore.pub > bore.log 2>&1 &
          
          # Portun oluşması için bekle
          sleep 8
          PORT=$(grep -oP 'remote_port=\K\d+' bore.log | head -1)
          
          if [ -z "$PORT" ]; then
            echo "Port alınamadı!"
            exit 1
          fi

          # Firebase'e veriyi gönder (NodeID olarak GitHub Run ID kullanıyoruz)
          FIREBASE_URL="https://proxybot-b4a59-default-rtdb.firebaseio.com/proxies/${{ github.run_id }}.json"
          curl -X PUT -d "{\"address\": \"bore.pub\", \"port\": \"$PORT\", \"user\": \"runner\", \"pass\": \"Admin123!\", \"status\": \"online\"}" $FIREBASE_URL

          echo "Proxy bilgileri Firebase'e iletildi: bore.pub:$PORT"
          
          # Akışı canlı tut
          tail -f bore.log
