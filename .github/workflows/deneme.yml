name: Full-Otomatik-Oylama-Sistemi
on: workflow_dispatch

jobs:
  oylama-operasyonu:
    runs-on: windows-latest
    steps:
      - name: Ekran ve GUI Hazirligi
        run: |
          Set-DisplayResolution -Width 1440 -Height 900 -Force
          pip install pyautogui Pillow --quiet

      - name: Botu Olustur ve Calistir
        shell: powershell
        run: |
          # Python kodunu buraya gomuyoruz
          $pythonCode = @"
          import pyautogui
          import time
          import os

          pyautogui.FAILSAFE = False
          if not os.path.exists('kanitlar'): os.makedirs('kanitlar')

          # Senin verdigin milimetrik koordinatlar
          KOORDINATLAR = {
              'nick': (329, 659),
              'checkbox': (147, 700),
              'cloudflare': (165, 753),
              'vote_btn': (178, 817)
          }
          USERNAME = "ZdzqcvDM7o"

          def ss_al(isim):
              pyautogui.screenshot(f'kanitlar/{isim}.png')

          print('Chrome aciliyor...')
          # Chrome'u Kiosk modunda baslat (Tam ekran garantisi)
          os.system('start chrome --window-size=1440,900 --kiosk --no-first-run https://minecraft-mp.com/server/328354/vote/')
          
          time.sleep(20) # Sayfanin yuklenmesini bekle
          
          print('Tiklamalar basliyor...')
          # 1. Nick Yazma
          pyautogui.click(KOORDINATLAR['nick'], duration=1.0)
          ss_al('1_nick')
          time.sleep(1)
          pyautogui.write(USERNAME, interval=0.1)
          
          # 2. I Agree
          time.sleep(1.5)
          pyautogui.click(KOORDINATLAR['checkbox'], duration=1.0)
          ss_al('2_agree')
          
          # 3. Cloudflare Verify
          time.sleep(1.5)
          pyautogui.click(KOORDINATLAR['cloudflare'], duration=1.0)
          ss_al('3_cloudflare')
          
          print('Cloudflare icin 5 sn bekleniyor...')
          time.sleep(5)
          
          # 4. Vote Butonu
          pyautogui.click(KOORDINATLAR['vote_btn'], duration=1.0)
          ss_al('4_final_vote')
          
          print('OPERASYON TAMAMLANDI!')
          "@
          
          $pythonCode | Out-File -FilePath "otobot.py" -Encoding utf8
          python otobot.py

      - name: Bore Tunnel ve RDP Hazirligi
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive bore.zip -DestinationPath "." -Force
          Get-ChildItem -Filter "bore.exe" -Recurse | Move-Item -Destination "." -Force
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Admin123!" -Force)
          .\bore.exe local 3389 --to bore.pub
