name: GitHub-Proxy-Cikisi
on: workflow_dispatch

jobs:
  proxy-server:
    runs-on: ubuntu-latest
    steps:
      - name: Proxy Sunucusunu Kur (Gost)
        run: |
          # Gost indiriliyor
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.1/gost-linux-amd64-2.11.1.gz
          gunzip gost-linux-amd64-2.11.1.gz
          chmod +x gost-linux-amd64-2.11.1
          
          # Arka planda SOCKS5 ve HTTP proxy başlatalım (Port 8080)
          # Kullanıcı adı ve şifre eklemiyorum ki bağlanman kolay olsun
          ./gost-linux-amd64-2.11.1 -L=:8080 > gost.log 2>&1 &
          echo "Proxy sunucusu 8080 portunda hazir!"

      - name: Bore Tunnel ile Disari Ac
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          
          # Proxy portunu (8080) bore.pub'a yönlendir
          ./bore local 8080 --to bore.pub 2>&1 | tee bore.log &
          
          sleep 5
          PORT=$(grep -oP 'remote_port=\K\d+' bore.log | head -1)

          echo ""
          echo "===================================================="
          echo "🌐 PROXY BAGLANTI BILGILERI"
          echo "===================================================="
          echo "Sunucu (Host): bore.pub"
          echo "Port: $PORT"
          echo "Tür: HTTP veya SOCKS5 (İkisi de çalışır)"
          echo "===================================================="
          echo "📌 NASIL KULLANILIR?"
          echo "Windows Ayarlar -> Proxy -> Manuel Proxy Kurulumu"
          echo "Adres: bore.pub  |  Port: $PORT"
          echo "===================================================="
          
          tail -f bore.log
