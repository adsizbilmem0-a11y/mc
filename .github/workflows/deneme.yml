name: Linux SSH Proxy Node 1
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 9999

    steps:
      - name: Setup SSH
        run: |
          echo "runner:Admin123!" | sudo chpasswd
          sudo systemctl start ssh

      - name: Start Bore & Report
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          
          ./bore local 22 --to bore.pub > bore.log 2>&1 &
          
          echo "Port bekleniyor..."
          for i in {1..10}; do
            sleep 3
            PORT=$(sed -r 's/\x1B\[[0-9;]*[mK]//g' bore.log | grep -oP 'remote_port=\K[0-9]+' | head -1)
            if [ ! -z "$PORT" ]; then break; fi
          done

          if [ -z "$PORT" ]; then exit 1; fi

          # Sadece bore.pub:PORT formatında gönderiyoruz
          # Tırnak işaretlerine dikkat: JSON içinde string olarak gitmeli
          DATA="\"bore.pub:$PORT\""
          
          # Firebase'de proxy1 altına yaz
          curl -X PUT -H "Content-Type: application/json" \
               -d "$DATA" \
               "https://proxybot-b4a59-default-rtdb.firebaseio.com/proxies/proxy1.json"

          echo "Proxy1 kaydedildi: bore.pub:$PORT"
          tail -f bore.log
