name: 3-rdp-makinesi
on: workflow_dispatch

jobs:
  makine-calistir:
    runs-on: windows-latest
    timeout-minutes: 360 # GitHub free tier sınırı 6 saattir (360 dk)
    strategy:
      matrix:
        makine_no: [1, 2, 3] # 3 makinayı aynı anda başlatır

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Ekran Cozunurlugunu Ayarla
        run: |
          Set-DisplayResolution -Width 1440 -Height 900 -Force

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
      
      - name: Set Password
        run: |
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Admin123!" -Force)
      
      - name: Open Chrome with Site
        run: |
          $url = "https://minecraft-mp.com/server/328354/vote/"
          $chromePath = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          Start-Process -FilePath $chromePath -ArgumentList "--start-maximized", "--no-first-run", "--no-default-browser-check", "--disable-sync", $url
          Write-Host "Chrome baslatildi, bot icin hazirlaniyor..." -ForegroundColor Green
          Start-Sleep -s 20 # Chrome'un tam yuklenmesi icin bekleme

      - name: Python Botu Kur ve Calistir
        run: |
          pip install pyautogui opencv-python pillow
          # Dosyalar workflows klasorunde oldugu icin oraya gidiyoruz
          cd .github/workflows
          python vote_bot.py

      - name: Start Bore Tunnel
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive bore.zip
          cd bore
          Write-Host "========================================" -ForegroundColor Green
          Write-Host "RDP BAGLANTI BILGILERI:" -ForegroundColor Green
          Write-Host "Kullanici: runneradmin" -ForegroundColor Yellow
          Write-Host "Sifre: Admin123!" -ForegroundColor Yellow
          Write-Host "Tunnel baslatiliyor..." -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Green
          .\bore.exe local 3389 --to bore.pub
