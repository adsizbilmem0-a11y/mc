name: 3-proxy-makinesi
on: workflow_dispatch

jobs:
  makine1:
    runs-on: windows-latest
    timeout-minutes: 9999
    steps:
      - name: Proxy Kur ve Baslat
        run: |
          Invoke-WebRequest -Uri "https://github.com/serjs/socks5-server/releases/download/v0.0.3/socks5-windows-amd64.zip" -OutFile "socks5.zip"
          Expand-Archive socks5.zip -DestinationPath socks5
          Start-Process -FilePath ".\socks5\socks5-windows-amd64.exe" -ArgumentList "-p 1080" -WindowStyle Hidden
          Start-Sleep 3
          Write-Host "MAKINE 1 PROXY HAZIR" -ForegroundColor Green

      - name: Bore Tunnel Baslat
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive bore.zip -DestinationPath bore
          Write-Host "========================================" -ForegroundColor Green
          Write-Host "MAKINE 1 - PROXY BAGLANTI:" -ForegroundColor Green
          Write-Host "bore.pub:PORT seklinde gorunecek" -ForegroundColor Yellow
          Write-Host "Chrome komutu: chrome.exe --proxy-server=socks5://bore.pub:PORT" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Green
          .\bore\bore.exe local 1080 --to bore.pub

