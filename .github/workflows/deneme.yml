name: 3-rdp-foto-makinesi
on: workflow_dispatch

jobs:
  makine-baslat:
    strategy:
      matrix:
        makine_no: [1, 2, 3] # Tek seferde 3 bağımsız makine açar
    runs-on: windows-latest
    timeout-minutes: 9999
    
    steps:
      - name: 1. Python Kütüphanelerini Kur
        run: |
          python -m pip install --upgrade pip
          pip install setuptools undetected-chromedriver pyautogui opencv-python
      
      - name: 2. Python Fotoğraf Kodunu Oluştur
        run: |
          @'
          import undetected_chromedriver as uc
          import pyautogui
          import time
          import os

          # Masaüstü yolunu otomatik bul
          desktop = os.path.join(os.environ['USERPROFILE'], 'Desktop')

          def operasyon():
              try:
                  # Önce boş bir masaüstü fotosu (Sistem durumunu görmek için)
                  print("📸 Genel masaüstü fotosu alınıyor...")
                  pyautogui.screenshot(os.path.join(desktop, "1_masaustu_genel.png"))
                  
                  # Tarayıcıyı başlat
                  options = uc.ChromeOptions()
                  options.add_argument("--start-maximized")
                  # Runner'larda GPU hatasını önlemek için
                  options.add_argument("--disable-gpu") 
                  
                  driver = uc.Chrome(options=options, version_main=145)
                  driver.get("https://minecraft-mp.com/server/328354/vote/")
                  
                  print("⏳ Sayfa yükleniyor (25 sn)...")
                  time.sleep(25)
                  
                  # Tarayıcı açıkken foto al
                  driver.save_screenshot(os.path.join(desktop, "2_tarayici_aktif.png"))
                  print("✅ Fotolar Masaüstüne kaydedildi.")
                  driver.quit()
              except Exception as e:
                  with open(os.path.join(desktop, "hata_log.txt"), "w") as f:
                      f.write(str(e))
          
          if __name__ == "__main__":
              operasyon()
          '@ | Out-File -FilePath foto_cek.py -Encoding utf8

      - name: 3. RDP ve Şifre Ayarları
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Admin123!" -Force)

      - name: 4. Fotoğraf Botunu Çalıştır
        run: |
          python foto_cek.py

      - name: 5. Bore Tunnel Başlat ve Bekle
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive bore.zip -DestinationPath .
          Write-Host "========================================" -ForegroundColor Green
          Write-Host "MAKINE ${{ matrix.makine_no }} RDP BILGILERI:" -ForegroundColor Green
          Write-Host "Kullanici: runneradmin / Sifre: Admin123!" -ForegroundColor Yellow
          Write-Host "Fotolar masaüstünde hazır!" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Green
          .\bore.exe local 3389 --to bore.pub
