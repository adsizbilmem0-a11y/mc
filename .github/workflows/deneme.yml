name: 3-proxy-makinesi
on: workflow_dispatch

jobs:
  makine1:
    runs-on: windows-latest
    timeout-minutes: 9999
    steps:
      - name: Python Proxy Kur
        run: |
          pip install requests
          @'
          import socket
          import threading
          import select

          def handle(client):
              try:
                  data = client.recv(256)
                  client.send(b"\x05\x00")
                  data = client.recv(256)
                  addr_type = data[3]
                  if addr_type == 1:
                      addr = socket.inet_ntoa(data[4:8])
                      port = int.from_bytes(data[8:10], "big")
                  elif addr_type == 3:
                      ln = data[4]
                      addr = data[5:5+ln].decode()
                      port = int.from_bytes(data[5+ln:7+ln], "big")
                  else:
                      client.close()
                      return
                  remote = socket.socket()
                  remote.connect((addr, port))
                  client.send(b"\x05\x00\x00\x01" + socket.inet_aton("0.0.0.0") + (0).to_bytes(2,"big"))
                  while True:
                      r, _, _ = select.select([client, remote], [], [], 60)
                      if not r:
                          break
                      for s in r:
                          d = s.recv(4096)
                          if not d:
                              return
                          (remote if s is client else client).sendall(d)
              except:
                  pass
              finally:
                  client.close()

          srv = socket.socket()
          srv.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          srv.bind(("0.0.0.0", 1080))
          srv.listen(100)
          print("PROXY HAZIR - port 1080", flush=True)
          while True:
              c, _ = srv.accept()
              threading.Thread(target=handle, args=(c,), daemon=True).start()
          '@ | Out-File -FilePath proxy.py -Encoding utf8
          Start-Process python -ArgumentList "proxy.py" -WindowStyle Hidden
          Start-Sleep 3
          Write-Host "MAKINE 1 PROXY HAZIR" -ForegroundColor Green

      - name: Bore Tunnel Baslat
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive bore.zip -DestinationPath bore
          Write-Host "MAKINE 1 - PROXY ADRESI asagida gorunecek:" -ForegroundColor Green
          .\bore\bore.exe local 1080 --to bore.pub

