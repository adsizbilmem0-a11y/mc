name: Windows-RDP-Izlemeli-Oylama-Fixed
on: workflow_dispatch

jobs:
  oylama:
    runs-on: windows-latest
    steps:
      - name: Hazirlik
        run: pip install setuptools undetected-chromedriver selenium --quiet

      - name: Bot Dosyasini Yaz
        run: |
          $botCode = @"
          import undetected_chromedriver as uc
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import time
          import sys

          sys.stdout.reconfigure(encoding='utf-8')

          options = uc.ChromeOptions()
          options.add_argument("--incognito")
          options.add_argument("--start-maximized")

          print("--- RDP BEKLENIYOR ---")
          input("RDP ile baglandiysan ve hazirsan ENTER'a bas...")

          driver = None
          try:
              chrome_path = r"C:\Program Files\Google\Chrome\Application\chrome.exe"
              driver = uc.Chrome(options=options, browser_executable_path=chrome_path, version_main=145)
              wait = WebDriverWait(driver, 60)

              print("Siteye gidiliyor...")
              driver.get("https://minecraft-mp.com/server/328354/vote/")
              
              print("Cloudflare cikarsa RDP'den tikla!")
              
              nickname_input = wait.until(EC.element_to_be_clickable((By.ID, "nickname")))
              nickname_input.send_keys("ZdzqcvDM7o")
              print("Nickname yazildi.")

              accept_cb = driver.find_element(By.ID, "accept")
              driver.execute_script("arguments[0].click();", accept_cb)
              
              print("Turnstile (Captcha) bekleniyor...")
              for i in range(120):
                  token = driver.execute_script("return document.querySelector('[name=\"cf-turnstile-response\"]').value;")
                  if token and len(token) > 10:
                      print(f"Token alindi! ({i}s)")
                      break
                  time.sleep(1)

              btn = driver.find_element(By.CSS_SELECTOR, "button[type='submit'][form='vote_form']")
              driver.execute_script("arguments[0].click();", btn)
              print("VOTE BASILDI!")
              
              time.sleep(10)
              input("Islem bitti. Kapatmak icin ENTER bas...")

          except Exception as e:
              print(f"HATA: {str(e)}")
              input("Hata incelemesi icin ENTER bekle...")
          finally:
              if driver: driver.quit()
          "@
          $botCode | Out-File -FilePath "vote_bot.py" -Encoding utf8

      - name: RDP ve Kullanici Ayari
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user runneradmin Admin123! /add
          net localgroup administrators runneradmin /add

      - name: Botu ve Bore'u Baslat
        run: |
          # PowerShell uyumlu yeni baslatma komutu
          Start-Process cmd.exe -ArgumentList "/k python vote_bot.py"
          
          # Bore kurulumu
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive bore.zip -DestinationPath "bore_dist" -Force
          Write-Host "RDP BAGLANTISI ICIN PORT BEKLENIYOR..." -ForegroundColor Yellow
          .\bore_dist\bore.exe local 3389 --to bore.pub
